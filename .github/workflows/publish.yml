# CI tests only. Publishing is MANUAL: `npm publish` locally + passkey (WebAuthn) 2FA.
# CI publish is not possible for this npm account — the `drak-marketing` account
# enforces 2FA with publish tokens disallowed, so any token-based `npm publish`
# fails with `npm error code EOTP`. See ~/.claude memory: npm-mcp-publishing.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
